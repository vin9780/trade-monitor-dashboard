name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test backend
        run: mvn clean test

  frontend-smoke-check:
    name: Frontend Smoke Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Verify frontend files exist
        run: |
          test -f index.html
          test -f app/app.module.js
          test -f app/routes.js
          test -f app/constants.js
          test -f app/services/trade-service.js
          test -f app/controllers/dashboard-controller.js
          test -f app/templates/dashboard.html
